<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Relaxaurus Dashboard</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Login Page -->
<div id="login-page">
  <div class="login-card">
    <div class="logo">🦖 Relaxaurus</div>
    <div class="sub">Palworld Server Dashboard</div>
    <a href="/auth/login" class="discord-btn">
      <svg viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.79 19.79 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.74 19.74 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.1 13.1 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.3 12.3 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.84 19.84 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Sign in with Discord
    </a>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- App Shell -->
<div id="app-page" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand">🦖 Relaxaurus</div>
    <nav>
      <a href="#dashboard" data-view="dashboard" class="active">📊 Dashboard</a>
      <a href="#console" data-view="console">🖥 Console</a>
      <a href="#players" data-view="players">👥 Players</a>
      <a href="#backups" data-view="backups">📦 Backups</a>
      <a href="#settings" data-view="settings">⚙️ Settings</a>
    </nav>
  </aside>
  <div class="main-area">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div class="server-info">
          <span class="server-name" id="tb-server">Pipot</span>
          <span class="status-pill online" id="tb-status"><span class="dot"></span>Online</span>
        </div>
      </div>
      <div class="user-menu">
        <span class="role-badge" id="tb-role">admin</span>
        <img id="tb-avatar" src="" alt="" style="display:none">
        <span id="tb-user">—</span>
        <a href="/logout" class="btn btn-outline btn-sm">Logout</a>
      </div>
    </header>
    <div class="content" id="content-area"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-body"></p>
    <div class="modal-buttons">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modal-confirm-btn">Confirm</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script src="/app.js"></script>
</body>
</html>
