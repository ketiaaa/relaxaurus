<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relaxaurus Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Login -->
<div id="login-page" class="page active">
  <div class="card login-card">
    <h1>🦖 Relaxaurus</h1>
    <p class="subtitle">Palworld Server Dashboard</p>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" required autocomplete="username">
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit">Sign In</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard-page" class="page">
  <header>
    <div class="header-left">
      <h1>🦖 Relaxaurus</h1>
      <span id="server-status" class="badge">Loading...</span>
    </div>
    <div class="header-right">
      <span id="current-user"></span>
      <button id="logout-btn" class="btn-ghost">Logout</button>
    </div>
  </header>

  <main>
    <!-- Server Info Cards -->
    <section class="cards-row" id="info-cards">
      <div class="card stat-card">
        <div class="stat-label">Server</div>
        <div class="stat-value" id="stat-name">--</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Players</div>
        <div class="stat-value" id="stat-players">--</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">FPS</div>
        <div class="stat-value" id="stat-fps">--</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Uptime</div>
        <div class="stat-value" id="stat-uptime">--</div>
      </div>
    </section>

    <!-- Player List -->
    <section class="card" id="players-section">
      <h2>👥 Online Players</h2>
      <div id="player-list">Loading...</div>
    </section>

    <!-- Admin Actions -->
    <section class="card" id="admin-section" style="display:none">
      <h2>⚙️ Server Controls</h2>
      <div class="actions-grid">
        <button class="btn-action" data-action="save">💾 Save World</button>
        <button class="btn-action btn-danger" data-action="shutdown">🛑 Shutdown</button>
        <button class="btn-action" onclick="showAnnounce()">📢 Announce</button>
        <button class="btn-action btn-danger" data-action="kick">👢 Kick Player</button>
        <button class="btn-action btn-danger" data-action="ban">🔨 Ban Player</button>
      </div>
      <div id="action-result" class="result-msg"></div>
    </section>

    <!-- Audit Log (admin only) -->
    <section class="card" id="audit-section" style="display:none">
      <h2>📋 Recent Activity</h2>
      <pre id="audit-log">Loading...</pre>
    </section>
  </main>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" class="modal">
  <div class="modal-content card">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-body"></p>
    <div class="modal-buttons">
      <button id="modal-cancel" class="btn-ghost">Cancel</button>
      <button id="modal-confirm" class="btn-danger">Confirm</button>
    </div>
  </div>
</div>

<!-- Announce Modal -->
<div id="announce-modal" class="modal">
  <div class="modal-content card">
    <h3>📢 Send Announcement</h3>
    <textarea id="announce-msg" rows="3" placeholder="Message to broadcast to all players..."></textarea>
    <div class="modal-buttons">
      <button id="announce-cancel" class="btn-ghost">Cancel</button>
      <button id="announce-send">Send</button>
    </div>
    <p id="announce-result" class="result-msg"></p>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
